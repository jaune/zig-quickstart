permissions:
  contents: write

name: release
on: [workflow_dispatch]
jobs:
  variables:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "compute variables"
        uses: actions/github-script@v7
        id: variables
        with:
          script: |
            try {
              const short_sha = '${{ github.sha }}'.substring(0, 9);
              const branch_name = '${{ github.head_ref || github.ref_name }}';

              core.setOutput('short-sha', short_sha);
              core.setOutput('branch-name', branch_name);
              core.setOutput('release-name', branch_name+'+'+short_sha);

              core.setOutput('artifact-tag', branch_name+'+'+short_sha);

              core.setOutput('zig-version', require('fs').readFileSync('./.zig-version', { encoding: 'utf-8' }).trim());
            } catch(err) {
              core.error("Error while computing variables")
              core.setFailed(err)
            }
    outputs:
      zig-verison: ${{steps.variables.outputs.zig-version}}
      short-sha: ${{steps.variables.outputs.short-sha}}
      branch-name: ${{steps.variables.outputs.branch-name}}
      release-name: ${{steps.variables.outputs.release-name}}
      artifact-tag: ${{steps.variables.outputs.artifact-tag}}

  build-windows-artifacts:
    needs: [variables]
    strategy:
      matrix:
        target: [x86_64-windows, aarch64-windows]
      fail-fast: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{needs.variables.outputs.zig-verison}}
      - run: |
          zig build -Dtarget=${{matrix.target}} -Doptimize=ReleaseSafe --summary all
      - run: |
          Compress-Archive -Path ./zig-out/bin/* -Destination zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{matrix.target}}
          path: |
            ./zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.zip

  build-macos-artifacts:
    needs: [variables]
    strategy:
      matrix:
        target: [x86_64-macos, aarch64-macos]
      fail-fast: false
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{needs.variables.outputs.zig-verison}}
      - run: |
          zig build -Dtarget=${{matrix.target}} -Doptimize=ReleaseSafe --summary all
      - run: |
          tar -cJf ./zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.tar.xz ./zig-out/bin/*
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{matrix.target}}
          path: |
            ./zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.tar.xz

  build-linux-artifacts:
    needs: [variables]
    strategy:
      matrix:
        target: [x86_64-linux, aarch64-linux]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: ${{needs.variables.outputs.zig-verison}}
      - run: |
          zig build -Dtarget=${{matrix.target}} -Doptimize=ReleaseSafe --summary all
      - run: |
          tar -cJf ./zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.tar.xz ./zig-out/bin/*
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{matrix.target}}
          path: |
            ./zig-quickstart-${{matrix.target}}-${{needs.variables.outputs.artifact-tag}}.tar.xz

  create-release:
    runs-on: ubuntu-latest
    needs: [variables, build-linux-artifacts, build-macos-artifacts, build-windows-artifacts]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: artifact-*
          merge-multiple: true
      - run: ls -R artifacts

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*
          prerelease: true
          draft: true
          name: ${{ needs.variables.outputs.release-name }}
